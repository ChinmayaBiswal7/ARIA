<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA Remote Control Hub (Firestore)</title>
  
  <!-- Firebase SDKs (Classic v8 for simple web script integration) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <!-- External Stylesheet -->
  <link rel="stylesheet" href="/public/controller.css?v=1">
</head>
<body>

  <div class="container">
    <header>
      <h1>ARIA <span>HUB</span></h1>
      <p style="color: #64748b; font-size: 0.9rem;">Firestore System Controller</p>
    </header>

    <div class="orb-container">
      <div class="orb"></div>
    </div>

    <!-- Live Status Monitor -->
    <div class="status-card">
      <div class="status-header">
        <div>Laptop Status</div>
        <div class="status-badge" id="hub-state">Online</div>
      </div>
      <div class="status-text" id="status-display">Waiting for status synchronization...</div>
    </div>

    <!-- Custom Command Input -->
    <div class="input-section">
      <input type="text" id="cmd-input" placeholder="Enter remote command...">
      <button onclick="sendCustomCommand()">Send</button>
    </div>

    <!-- Dictation Microphone -->
    <div class="grid-header" style="text-align: center;">Vocal Dictation</div>
    <div class="mic-button" id="mic-trigger" onclick="toggleVoiceDictation()">
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12,14A3,3 0 0,0 15,11V5A3,3 0 0,0 12,2A3,3 0 0,0 9,5V11A3,3 0 0,0 12,14M17.3,11C17.3,14 14.76,16.1 12,16.1C9.24,16.1 6.7,14 6.7,11H5C5,14.41 7.72,17.23 11,17.72V21H13V17.72C16.28,17.23 19,14.41 19,11H17.3Z" />
      </svg>
    </div>

    <!-- Shortcut Actions Grid -->
    <div class="grid-header">Quick Macros</div>
    <div class="shortcuts-grid">
      <div class="shortcut-card" onclick="sendShortcut('prepare ml workspace')">
        <div class="shortcut-icon">💻</div>
        <div class="shortcut-title">ML Workspace</div>
        <div class="shortcut-desc">VS Code, HF, Explorer</div>
      </div>
      <div class="shortcut-card" onclick="sendShortcut('study mode')">
        <div class="shortcut-icon">📖</div>
        <div class="shortcut-title">Study Focus</div>
        <div class="shortcut-desc">Mute + Distraction Block</div>
      </div>
      <div class="shortcut-card" onclick="sendShortcut('pc status')">
        <div class="shortcut-icon">🔋</div>
        <div class="shortcut-title">Check Stats</div>
        <div class="shortcut-desc">Battery, active window</div>
      </div>
      <div class="shortcut-card" onclick="sendShortcut('close the tab')">
        <div class="shortcut-icon">✖</div>
        <div class="shortcut-title">Close Tab</div>
        <div class="shortcut-desc">Browser cleanup</div>
      </div>
    </div>
  </div>

  <!-- External JavaScript Logic -->
  <script src="/public/controller.js?v=1"></script>
</body>
</html>
