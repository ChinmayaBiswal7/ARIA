<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA Remote Control Hub (Firestore)</title>
  
  <!-- Firebase SDKs (Classic v8 for simple web script integration) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <style>
    :root {
      --bg-color: #0b0b16;
      --panel-bg: rgba(20, 20, 35, 0.6);
      --accent-color: #00e5ff;
      --text-color: #e2e8f0;
      --glow-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at 50% 50%, #151530 0%, #0b0b16 100%);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin-top: 20px;
    }

    /* Sci-Fi Header */
    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-color);
      letter-spacing: 2px;
      text-shadow: var(--glow-shadow);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    h1 span {
      color: var(--accent-color);
    }

    /* Glowing Interface Orb */
    .orb-container {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .orb {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #80f5ff 0%, #00a8cc 50%, #004d66 100%);
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.6);
      animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 229, 255, 0.6); }
      50% { transform: scale(1.08); box-shadow: 0 0 50px rgba(0, 229, 255, 0.9); }
    }

    /* Status Card */
    .status-card {
      background: var(--panel-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .status-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #94a3b8;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      color: var(--accent-color);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-badge::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--accent-color);
      box-shadow: 0 0 8px var(--accent-color);
    }

    .status-text {
      font-size: 1rem;
      line-height: 1.5;
      font-style: italic;
      color: #cbd5e1;
    }

    /* Control Inputs */
    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    input[type="text"] {
      flex: 1;
      background: rgba(15, 15, 25, 0.8);
      border: 1px solid rgba(0, 229, 255, 0.3);
      border-radius: 12px;
      padding: 14px;
      color: var(--text-color);
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
    }

    button {
      background: linear-gradient(135deg, #00b4db, #0083b0);
      border: none;
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
      box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4);
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 180, 219, 0.6);
    }

    button:active {
      transform: translateY(0);
    }

    /* Dictation Mic Button */
    .mic-button {
      background: radial-gradient(circle, #e11d48 0%, #9f1239 100%);
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px auto;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(225, 29, 72, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .mic-button.listening {
      animation: mic-pulse 1.5s infinite ease-in-out;
      background: #10b981;
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.8);
    }

    @keyframes mic-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .mic-icon {
      fill: white;
      width: 32px;
      height: 32px;
    }

    /* Quick Shortcuts Grid */
    .grid-header {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 30px;
    }

    .shortcut-card {
      background: var(--panel-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .shortcut-card:hover {
      background: rgba(0, 229, 255, 0.08);
      border-color: rgba(0, 229, 255, 0.4);
      transform: translateY(-2px);
    }

    .shortcut-icon {
      font-size: 1.5rem;
      margin-bottom: 6px;
    }

    .shortcut-title {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .shortcut-desc {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 3px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>ARIA <span>HUB</span></h1>
      <p style="color: #64748b; font-size: 0.9rem;">Firestore System Controller</p>
    </header>

    <div class="orb-container">
      <div class="orb"></div>
    </div>

    <!-- Live Status Monitor -->
    <div class="status-card">
      <div class="status-header">
        <div>Laptop Status</div>
        <div class="status-badge" id="hub-state">Online</div>
      </div>
      <div class="status-text" id="status-display">Waiting for status synchronization...</div>
    </div>

    <!-- Custom Command Input -->
    <div class="input-section">
      <input type="text" id="cmd-input" placeholder="Enter remote command...">
      <button onclick="sendCustomCommand()">Send</button>
    </div>

    <!-- Dictation Microphone -->
    <div class="grid-header" style="text-align: center;">Vocal Dictation</div>
    <div class="mic-button" id="mic-trigger" onclick="toggleVoiceDictation()">
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12,14A3,3 0 0,0 15,11V5A3,3 0 0,0 12,2A3,3 0 0,0 9,5V11A3,3 0 0,0 12,14M17.3,11C17.3,14 14.76,16.1 12,16.1C9.24,16.1 6.7,14 6.7,11H5C5,14.41 7.72,17.23 11,17.72V21H13V17.72C16.28,17.23 19,14.41 19,11H17.3Z" />
      </svg>
    </div>

    <!-- Shortcut Actions Grid -->
    <div class="grid-header">Quick Macros</div>
    <div class="shortcuts-grid">
      <div class="shortcut-card" onclick="sendShortcut('prepare ml workspace')">
        <div class="shortcut-icon">💻</div>
        <div class="shortcut-title">ML Workspace</div>
        <div class="shortcut-desc">VS Code, HF, Explorer</div>
      </div>
      <div class="shortcut-card" onclick="sendShortcut('study mode')">
        <div class="shortcut-icon">📖</div>
        <div class="shortcut-title">Study Focus</div>
        <div class="shortcut-desc">Mute + Distraction Block</div>
      </div>
      <div class="shortcut-card" onclick="sendShortcut('pc status')">
        <div class="shortcut-icon">🔋</div>
        <div class="shortcut-title">Check Stats</div>
        <div class="shortcut-desc">Battery, active window</div>
      </div>
      <div class="shortcut-card" onclick="sendShortcut('close the tab')">
        <div class="shortcut-icon">✖</div>
        <div class="shortcut-title">Close Tab</div>
        <div class="shortcut-desc">Browser cleanup</div>
      </div>
    </div>
  </div>

  <script>
    // Initialize Firebase Web Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyA5l74ebBKR8-veakGNISlwkIdasA-vQaQ",
      authDomain: "aria-3e1da.firebaseapp.com",
      projectId: "aria-3e1da",
      storageBucket: "aria-3e1da.firebasestorage.app",
      messagingSenderId: "968886942490",
      appId: "1:968886942490:web:8ab8c8a061ae6d79a94aa3",
      measurementId: "G-Y1PTEHQV8Q"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ── Live Status Listener (Firestore Document Snapshot) ──────────────────
    db.collection("status").doc("latest").onSnapshot((doc) => {
      if (doc.exists) {
        const data = doc.data();
        document.getElementById("status-display").innerText = data.last_response || "No reports.";
        const badge = document.getElementById("hub-state");
        badge.innerText = data.status || "online";
        if (data.status === "thinking") {
          badge.style.color = "#fbbf24";
        } else if (data.status === "listening") {
          badge.style.color = "#10b981";
        } else {
          badge.style.color = "var(--accent-color)";
        }
      }
    }, (error) => {
      console.error("Firestore Listen Error:", error);
    });

    // ── Send Command API (Firestore Document Write) ─────────────────────────
    function sendCommand(text) {
      if (!text.trim()) return;
      const cmdId = "cmd_" + Date.now();
      
      db.collection("commands").doc("latest").set({
        id: cmdId,
        text: text.trim(),
        timestamp: Date.now()
      }).then(() => {
        console.log("Command pushed to Firestore:", text);
      }).catch(err => {
        alert("Firestore write error: " + err.message + "\n\nMake sure Firestore Security Rules are open (e.g. read/write allowed).");
      });
    }

    function sendCustomCommand() {
      const input = document.getElementById("cmd-input");
      sendCommand(input.value);
      input.value = "";
    }

    function sendShortcut(text) {
      sendCommand(text);
    }

    // ── Speech Recognition Integration ────────────────────────────────────
    let recognition;
    let isListening = false;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechGen = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechGen();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      recognition.onstart = () => {
        isListening = true;
        document.getElementById("mic-trigger").classList.add("listening");
      };

      recognition.onend = () => {
        isListening = false;
        document.getElementById("mic-trigger").classList.remove("listening");
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        console.log("Speech transcript:", transcript);
        sendCommand(transcript);
        document.getElementById("status-display").innerText = "Voice captured: \"" + transcript + "\". Transmitting...";
      };

      recognition.onerror = (e) => {
        console.error("Speech Recognition Error", e);
        document.getElementById("mic-trigger").classList.remove("listening");
      };
    }

    function toggleVoiceDictation() {
      if (!recognition) {
        alert("Web Speech API is not supported in this browser. Try opening in Chrome or Safari.");
        return;
      }

      if (isListening) {
        recognition.stop();
      } else {
        recognition.start();
      }
    }
  </script>
</body>
</html>
